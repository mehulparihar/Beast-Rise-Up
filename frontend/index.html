    <meta http-equiv="X-UA-Compatible" content="IE=edge" />

    <!-- ============ PRIMARY SEO ============ -->
    <title>Beast Rise Up | Trendy Streetwear & Gym Clothing Online India</title>
    <meta
      name="description"
      content="Shop Beast Rise Up for premium streetwear, gym wear, oversized t-shirts, hoodies & activewear. Bold designs for men & women. Free shipping across India. Unleash the beast in you!"
    />
    <meta
      name="keywords"
      content="beast rise up, streetwear india, gym clothing, oversized t-shirts, hoodies, activewear, fitness clothing, workout wear, trendy clothing online, beast clothing brand, urban fashion india, men streetwear, women gym wear, graphic tees india, drop shoulder t-shirts"
    />
    <meta name="author" content="Beast Rise Up" />

      property="og:title"
      content="Beast Rise Up | Trendy Streetwear & Gym Clothing Online India"

      name="twitter:title"
      content="Beast Rise Up | Trendy Streetwear & Gym Clothing Online India"

    <!-- ============ STRUCTURED DATA — Organization ============ -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Organization",
        "name": "Beast Rise Up",
        "alternateName": "BeastRiseUp",
        "url": "https://www.beastriseup.com",
        "logo": "https://www.beastriseup.com/logo.png",
        "description": "Premium streetwear & gym clothing brand based in India.",
        "foundingDate": "2024",
        "contactPoint": {
          "@type": "ContactPoint",
          "telephone": "+91-XXXXXXXXXX",
          "contactType": "customer service",
          "areaServed": "IN",
          "availableLanguage": ["English", "Hindi"]
        },
        "sameAs": [
          "https://www.instagram.com/beastriseup",
          "https://www.facebook.com/beastriseup",
          "https://twitter.com/beastriseup",
          "https://www.youtube.com/@beastriseup"
        ]
      }
    </script>

    <!-- ============ STRUCTURED DATA — Website (Sitelinks Search Box) ============ -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "Beast Rise Up",
        "url": "https://www.beastriseup.com",
        "potentialAction": {
          "@type": "SearchAction",
          "target": {
            "@type": "EntryPoint",
            "urlTemplate": "https://www.beastriseup.com/search?q={search_term_string}"
          },
          "query-input": "required name=search_term_string"
        }
      }
    </script>

    <!-- ============ STRUCTURED DATA — Online Store ============ -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "ClothingStore",
        "name": "Beast Rise Up",
        "image": "https://www.beastriseup.com/og-image.jpg",
        "url": "https://www.beastriseup.com",
        "priceRange": "₹₹",
        "address": {
          "@type": "PostalAddress",
          "addressCountry": "IN"
        },
        "openingHoursSpecification": {
          "@type": "OpeningHoursSpecification",
          "dayOfWeek": [
            "Monday","Tuesday","Wednesday",
            "Thursday","Friday","Saturday","Sunday"
          ],
          "opens": "00:00",
          "closes": "23:59"
        }
      }
    </script>

    <!-- ============ STRUCTURED DATA — BreadcrumbList ============ -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
